services:
  - type: web
    name: bihar-skill-intern-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://biharskillinterns.in
      - key: FRONTEND_URLS
        value: https://biharskillinterns.in,https://www.biharskillinterns.in,https://biharskillinterns-afk.github.io
      - key: JWT_EXPIRE
        value: 7d
      - key: SKIP_SCHEMA_SYNC
        value: "true"
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
