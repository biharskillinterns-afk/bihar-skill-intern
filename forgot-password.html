<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Bihar Skill Intern</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .forgot-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 48px 20px;
        }

        .forgot-box {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border: 1px solid #e2e8f0;
            border-top: 4px solid #2563eb;
            border-radius: 14px;
            box-shadow: 0 22px 55px rgba(15, 23, 42, 0.12);
        }

        .forgot-box h2 {
            color: #172033;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .forgot-box .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 0.95em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 8px rgba(37, 99, 235, 0.2);
        }

        .forgot-box button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 10px;
        }

        .forgot-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 0.95em;
        }

        .back-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #777;
            font-size: 0.85em;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        @media (max-width: 480px) {
            .forgot-box {
                padding: 30px 20px;
            }

            .forgot-box h2 {
                font-size: 1.5em;
            }
        }
    </style>
    <link rel="stylesheet" href="premium-ui.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="POSK.html">Certificate</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li style="margin-left: auto;"><a href="login.html" class="nav-login">Login</a></li>
        </ul>
    </nav>

    <div class="forgot-container">
        <div class="forgot-box">
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email to reset your password</p>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                </div>

                <button type="submit">Send Reset Link</button>
            </form>

            <div class="divider">or reset instantly</div>

            <form id="detailsResetForm" onsubmit="handleDetailsReset(event)">
                <div class="form-group">
                    <label for="resetEmail">Registered Email</label>
                    <input type="email" id="resetEmail" placeholder="your.email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="resetPhone">Registered Phone Number</label>
                    <input type="tel" id="resetPhone" placeholder="10 digit mobile number" required>
                </div>

                <div class="form-group">
                    <label for="resetDob">Date of Birth</label>
                    <input type="date" id="resetDob" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Minimum 6 characters" required minlength="6">
                </div>

                <button type="submit">Reset Password Now</button>
            </form>

            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const backLink = document.querySelector('.back-link a');
            if (backLink) {
                backLink.textContent = 'Back to Login';
            }
        });

        async function handleForgotPassword(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitButton = event.target.querySelector('button');

            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Basic validation
            if (!email) {
                errorMessage.textContent = 'Please enter your email';
                errorMessage.style.display = 'block';
                return;
            }

            // Disable button
            submitButton.disabled = true;
            submitButton.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    successMessage.textContent = data.message;
                    successMessage.style.display = 'block';
                } else {
                    errorMessage.textContent = data.message;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again.';
                errorMessage.style.display = 'block';
            } finally {
                // Re-enable button
                submitButton.disabled = false;
                submitButton.textContent = 'Send Reset Link';
            }
        }

        async function handleDetailsReset(event) {
            event.preventDefault();

            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitButton = event.target.querySelector('button');
            const email = document.getElementById('resetEmail').value.trim();
            const phone = document.getElementById('resetPhone').value.trim();
            const dob = document.getElementById('resetDob').value;
            const newPassword = document.getElementById('newPassword').value;

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            if (!email || !phone || !dob || !newPassword) {
                errorMessage.textContent = 'Please fill all reset fields.';
                errorMessage.style.display = 'block';
                return;
            }

            if (newPassword.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters.';
                errorMessage.style.display = 'block';
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = 'Resetting...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password-by-details`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone, dob, newPassword })
                });

                const data = await response.json();

                if (data.success) {
                    successMessage.textContent = data.message;
                    successMessage.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1800);
                } else {
                    errorMessage.textContent = data.message || 'Password reset failed.';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again.';
                errorMessage.style.display = 'block';
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Reset Password Now';
            }
        }
    </script>
</body>
</html>
