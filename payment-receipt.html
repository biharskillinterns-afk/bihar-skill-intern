<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipt - Bihar Skill Interns</title>
    <script src="api-config.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
            color: #0f172a;
            font-family: Arial, sans-serif;
            padding: 28px 16px;
        }

        .receipt-shell {
            max-width: 920px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .back-btn,
        .print-btn {
            border: 0;
            border-radius: 8px;
            padding: 12px 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .back-btn {
            background: #e2e8f0;
            color: #0f172a;
        }

        .print-btn {
            background: #2563eb;
            color: white;
        }

        .receipt-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .receipt-header {
            background: linear-gradient(135deg, #173b78 0%, #0f766e 100%);
            color: white;
            padding: 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-badge {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.16);
            display: grid;
            place-items: center;
            font-size: 1.5rem;
            font-weight: 900;
        }

        .brand h1 {
            font-size: 1.55rem;
            margin-bottom: 5px;
        }

        .brand p {
            opacity: 0.88;
            font-size: 0.95rem;
        }

        .status-pill {
            background: #dcfce7;
            color: #166534;
            border-radius: 999px;
            padding: 10px 14px;
            font-weight: 900;
            white-space: nowrap;
        }

        .receipt-body {
            padding: 26px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }

        .summary-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
        }

        .summary-box span {
            display: block;
            color: #64748b;
            font-size: 0.82rem;
            margin-bottom: 8px;
        }

        .summary-box strong {
            font-size: 1.15rem;
            word-break: break-word;
        }

        .amount-box strong {
            color: #2563eb;
            font-size: 1.8rem;
        }

        .section-title {
            font-size: 1.05rem;
            margin: 24px 0 12px;
        }

        .detail-grid {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 220px 1fr;
            border-bottom: 1px solid #e2e8f0;
        }

        .detail-row:last-child {
            border-bottom: 0;
        }

        .detail-label {
            background: #f8fafc;
            color: #475569;
            font-weight: 800;
            padding: 14px 16px;
        }

        .detail-value {
            padding: 14px 16px;
            word-break: break-word;
        }

        .empty-state {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            border-radius: 8px;
            padding: 16px;
            font-weight: 700;
        }

        .footer-note {
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-top: 18px;
        }

        @media (max-width: 720px) {
            .receipt-header,
            .topbar {
                align-items: stretch;
                flex-direction: column;
            }

            .summary {
                grid-template-columns: 1fr;
            }

            .detail-row {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .topbar {
                display: none;
            }

            .receipt-card {
                box-shadow: none;
                border: 0;
            }
        }
    </style>
</head>
<body>
    <main class="receipt-shell">
        <div class="topbar">
            <button class="back-btn" onclick="window.location.href='courses.html'">Back to Dashboard</button>
            <button class="print-btn" onclick="window.print()">Download / Print Receipt</button>
        </div>

        <section class="receipt-card">
            <div class="receipt-header">
                <div class="brand">
                    <div class="brand-badge">B</div>
                    <div>
                        <h1>Bihar Skill Interns</h1>
                        <p>Registration Payment Receipt</p>
                    </div>
                </div>
                <div class="status-pill" id="receiptStatus">Checking...</div>
            </div>

            <div class="receipt-body">
                <div id="receiptContent" class="empty-state">Loading payment details...</div>
            </div>
        </section>
    </main>

    <script>
        const receiptContent = document.getElementById('receiptContent');
        const receiptStatus = document.getElementById('receiptStatus');

        function storageValue(key, fallback = '-') {
            const value = localStorage.getItem(key);
            return value && value !== 'null' && value !== 'undefined' ? value : fallback;
        }

        function formatAmount(value) {
            const amount = Number(value);
            if (!Number.isFinite(amount) || amount <= 0) return '-';
            return `₹${amount.toLocaleString('en-IN', { maximumFractionDigits: 2 })}`;
        }

        function formatDateTime(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleString('en-IN', {
                dateStyle: 'medium',
                timeStyle: 'short'
            });
        }

        function escapeHTML(value) {
            return String(value ?? '-').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function normalizePayment(payment = {}) {
            return {
                amount: payment.amount || storageValue('paymentAmount', ''),
                status: payment.status || storageValue('paymentStatus', 'completed'),
                courseName: payment.courseName || 'Registration Fee',
                paymentMethod: payment.paymentMethod || storageValue('paymentMethod', 'Razorpay'),
                gatewayPaymentId: payment.gatewayPaymentId || storageValue('razorpayPaymentId', '-'),
                gatewayOrderId: payment.gatewayOrderId || storageValue('razorpayOrderId', '-'),
                createdAt: payment.createdAt || payment.completedAt || storageValue('paymentCompletedAt', ''),
                completedAt: payment.completedAt || payment.createdAt || storageValue('paymentCompletedAt', ''),
                notes: payment.notes || ''
            };
        }

        function renderReceipt(payment) {
            const studentName = storageValue('userName', 'Student');
            const studentEmail = storageValue('userEmail', storageValue('userUsername', '-'));
            const rollNo = storageValue('userRollNo', '-');
            const receiptNo = payment.gatewayPaymentId !== '-' ? payment.gatewayPaymentId : `BSI-${Date.now()}`;
            const statusText = String(payment.status || '').toLowerCase() === 'completed' ? 'Paid' : payment.status || 'Paid';

            receiptStatus.textContent = statusText;
            receiptContent.className = '';
            receiptContent.innerHTML = `
                <div class="summary">
                    <div class="summary-box amount-box">
                        <span>Amount Paid</span>
                        <strong>${formatAmount(payment.amount)}</strong>
                    </div>
                    <div class="summary-box">
                        <span>Payment Time</span>
                        <strong>${formatDateTime(payment.completedAt || payment.createdAt)}</strong>
                    </div>
                    <div class="summary-box">
                        <span>Receipt No.</span>
                        <strong>${escapeHTML(receiptNo)}</strong>
                    </div>
                </div>

                <h2 class="section-title">Student Details</h2>
                <div class="detail-grid">
                    <div class="detail-row"><div class="detail-label">Student Name</div><div class="detail-value">${escapeHTML(studentName)}</div></div>
                    <div class="detail-row"><div class="detail-label">Email</div><div class="detail-value">${escapeHTML(studentEmail)}</div></div>
                    <div class="detail-row"><div class="detail-label">Roll Number</div><div class="detail-value">${escapeHTML(rollNo)}</div></div>
                </div>

                <h2 class="section-title">Payment Details</h2>
                <div class="detail-grid">
                    <div class="detail-row"><div class="detail-label">Purpose</div><div class="detail-value">${escapeHTML(payment.courseName || 'Registration Fee')}</div></div>
                    <div class="detail-row"><div class="detail-label">Payment Method</div><div class="detail-value">${escapeHTML(payment.paymentMethod || 'Razorpay')}</div></div>
                    <div class="detail-row"><div class="detail-label">Payment ID</div><div class="detail-value">${escapeHTML(payment.gatewayPaymentId || '-')}</div></div>
                    <div class="detail-row"><div class="detail-label">Order ID</div><div class="detail-value">${escapeHTML(payment.gatewayOrderId || '-')}</div></div>
                    <div class="detail-row"><div class="detail-label">Status</div><div class="detail-value">${escapeHTML(statusText)}</div></div>
                    <div class="detail-row"><div class="detail-label">Generated On</div><div class="detail-value">${formatDateTime(new Date())}</div></div>
                </div>

                <p class="footer-note">This receipt is generated from the saved payment record on the Bihar Skill Interns portal.</p>
            `;
        }

        async function loadReceipt() {
            const hasLocalPayment = storageValue('paymentStatus', '') === 'completed' ||
                storageValue('paymentVerified', '') === 'true' ||
                storageValue('razorpayPaymentId', '') !== '';

            try {
                if (typeof APIService !== 'undefined' && storageValue('authToken', '') !== '') {
                    const response = await APIService.getPaymentHistory();
                    if (response && response.success && Array.isArray(response.payments) && response.payments.length > 0) {
                        const completed = response.payments.find(payment => payment.status === 'completed') || response.payments[0];
                        renderReceipt(normalizePayment(completed));
                        return;
                    }
                }
            } catch (error) {
                console.warn('Payment history load failed:', error.message);
            }

            if (hasLocalPayment) {
                renderReceipt(normalizePayment({}));
                return;
            }

            receiptStatus.textContent = 'Not Found';
            receiptContent.className = 'empty-state';
            receiptContent.textContent = 'Payment receipt was not found. After payment is completed, the receipt will appear here.';
        }

        window.addEventListener('load', loadReceipt);
    </script>
</body>
</html>
