<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Bihar Skill Interns</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
            font-family: Arial, sans-serif;
            color: #111827;
            padding: 20px;
        }

        .payment-box {
            width: min(460px, 100%);
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.13);
            padding: 30px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
        }

        .brand img {
            width: 54px;
            height: 54px;
            object-fit: contain;
        }

        h1 {
            font-size: 1.45rem;
            margin: 0;
        }

        .summary {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin: 18px 0;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 9px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .row:last-child {
            border-bottom: 0;
            font-size: 1.1rem;
            font-weight: 800;
            color: #2563eb;
        }

        .pay-btn,
        .back-btn {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 13px 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .pay-btn {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
        }

        .pay-btn:hover:not(:disabled) {
            background: #1e40af;
            transform: translateY(-1px);
        }

        .pay-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .back-btn {
            background: #e5e7eb;
            color: #374151;
        }

        .back-btn:hover {
            background: #d1d5db;
        }

        .status {
            display: none;
            margin-top: 14px;
            padding: 11px 12px;
            border-radius: 7px;
            font-size: 0.92rem;
        }

        .status.error {
            display: block;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .status.success {
            display: block;
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .helpline-card {
            margin-top: 14px;
            padding: 12px 14px;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            background: #f0fdf4;
            color: #14532d;
            text-align: center;
            font-size: 0.92rem;
            font-weight: 700;
        }

        .helpline-card a {
            color: #047857;
            text-decoration: none;
            font-weight: 800;
        }

        .helpline-card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="payment-box">
        <div class="brand">
            <img src="logo.png" alt="Bihar Skill Interns logo">
            <div>
                <h1>Complete Registration Payment</h1>
                <p style="margin: 5px 0 0; color: #6b7280;">Bihar Skill Interns</p>
            </div>
        </div>

        <div class="summary">
            <div class="row">
                <span>Student</span>
                <strong id="studentName">Student</strong>
            </div>
            <div class="row">
                <span>Email</span>
                <strong id="studentEmail">-</strong>
            </div>
            <div class="row">
                <span>Registration Fee</span>
                <strong id="paymentAmount">₹299</strong>
            </div>
        </div>

        <button id="payButton" class="pay-btn" onclick="startPayment()">Pay Securely</button>
        <button class="back-btn" onclick="window.location.href='register.html'">Back to Registration</button>
        <div id="paymentStatus" class="status"></div>
        <div class="helpline-card">
            Payment help (WhatsApp only):
            <a href="https://wa.me/917079952655" target="_blank" rel="noopener">+91 70799 52655</a>
        </div>
    </main>

    <script src="api-config.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        const DEFAULT_REGISTRATION_AMOUNT = 299;
        let paymentStatusTimer = null;

        function getStorage() {
            return typeof BSIAuthStorage !== 'undefined' ? BSIAuthStorage : localStorage;
        }

        function getStoredValue(key, fallback = '') {
            const value = getStorage().getItem(key);
            return value === null || value === undefined || value === '' ? fallback : value;
        }

        function setStoredValue(key, value) {
            getStorage().setItem(key, value);
        }

        function getPaymentAmount() {
            const amount = Number(getStoredValue('bsiPaymentAmount', DEFAULT_REGISTRATION_AMOUNT));
            return Number.isFinite(amount) && amount > 0 ? Math.round(amount) : DEFAULT_REGISTRATION_AMOUNT;
        }

        function setStatus(message, type = 'error') {
            const status = document.getElementById('paymentStatus');
            status.textContent = message;
            status.className = `status ${type}`;
        }

        function redirectToDocuments() {
            const documentsUrl = new URL('registration-documents.html', window.location.href).href;
            const documentsWithSource = new URL(documentsUrl);
            documentsWithSource.searchParams.set('from', 'payment');
            const status = document.getElementById('paymentStatus');
            status.innerHTML = `Payment successful. <a href="${documentsWithSource.href}" style="color: inherit; font-weight: 800;">Download registration documents</a>`;
            status.className = 'status success';
            document.querySelectorAll('.razorpay-container').forEach(container => container.remove());

            setTimeout(() => {
                window.location.replace(documentsWithSource.href);
            }, 250);

            setTimeout(() => {
                window.location.href = documentsWithSource.href;
            }, 900);
        }

        function saveCompletedPayment(paymentData = {}) {
            setStoredValue('paymentStatus', 'completed');
            const completedAt = paymentData.completedAt || new Date().toISOString();
            setStoredValue('paymentDate', new Date(completedAt).toLocaleString());
            setStoredValue('paymentCompletedAt', completedAt);
            setStoredValue('paymentAmount', String(paymentData.amount || getPaymentAmount()));
            setStoredValue('paymentMethod', 'razorpay');
            setStoredValue('paymentGateway', 'razorpay');
            if (paymentData.razorpayPaymentId) setStoredValue('razorpayPaymentId', paymentData.razorpayPaymentId);
            if (paymentData.razorpayOrderId) setStoredValue('razorpayOrderId', paymentData.razorpayOrderId);
            if (paymentData.razorpaySignature) setStoredValue('razorpaySignature', paymentData.razorpaySignature);
            setStoredValue('paymentVerified', 'true');
            setStoredValue('isRegistrationComplete', 'true');
            setStoredValue('isLoggedIn', 'false');
        }

        async function checkCompletedPayment(order, amount) {
            const status = await APIService.getRegistrationPaymentStatus(order.razorpayOrderId, {
                studentEmail: getStoredValue('userEmail', ''),
                pendingRegistrationId: getStoredValue('pendingRegistrationId', ''),
                amount: String(order.amount || amount || getPaymentAmount())
            });

            if (status?.success && status.status === 'completed') {
                if (paymentStatusTimer) {
                    clearInterval(paymentStatusTimer);
                    paymentStatusTimer = null;
                }
                saveCompletedPayment({
                    amount: order.amount || amount || getPaymentAmount(),
                    razorpayPaymentId: status.razorpayPaymentId,
                    razorpayOrderId: status.razorpayOrderId || order.razorpayOrderId
                });
                if (status.student && typeof BSIAuthStorage !== 'undefined') {
                    BSIAuthStorage.saveStudent(status.student, status.student.passwordHash || '');
                }
                redirectToDocuments();
                return true;
            }

            return false;
        }

        function startPaymentStatusPolling(order, amount) {
            if (paymentStatusTimer) clearInterval(paymentStatusTimer);
            let attempts = 0;
            paymentStatusTimer = setInterval(async () => {
                attempts += 1;
                if (attempts > 80) {
                    clearInterval(paymentStatusTimer);
                    paymentStatusTimer = null;
                    return;
                }

                try {
                    await checkCompletedPayment(order, amount);
                } catch (error) {
                    console.warn('Payment status check failed:', error.message);
                }
            }, 3000);
        }

        function getFrontendBaseUrl() {
            return new URL('./', window.location.href).href;
        }

        function getCallbackUrl(order, amount) {
            const callbackUrl = new URL(`${API_BASE_URL}/payments/registration-callback`);
            callbackUrl.searchParams.set('frontend', getFrontendBaseUrl());
            callbackUrl.searchParams.set('studentEmail', getStoredValue('userEmail', ''));
            callbackUrl.searchParams.set('pendingRegistrationId', getStoredValue('pendingRegistrationId', ''));
            callbackUrl.searchParams.set('amount', String(order.amount || amount || getPaymentAmount()));
            return callbackUrl.toString();
        }

        function showPaymentReturnStatus() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('payment') === 'failed') {
                const reason = params.get('reason') || 'Payment failed.';
                setStatus(`Payment was not completed: ${reason}`);
            }
        }

        function resetPayButton(message) {
            const payButton = document.getElementById('payButton');
            document.querySelectorAll('.razorpay-container').forEach(container => container.remove());
            payButton.disabled = false;
            payButton.textContent = 'Pay Securely';
            if (message) setStatus(message);
        }

        function generateOrderId() {
            const existing = getStoredValue('orderId', '');
            if (existing) return existing;
            const orderId = 'BSI' + Date.now().toString().slice(-9);
            setStoredValue('orderId', orderId);
            return orderId;
        }

        async function loadRegistrationAmount() {
            try {
                if (typeof APIService === 'undefined') return;
                const response = await APIService.getRegistrationPaymentAmount();
                if (response?.success && Number(response.amount) > 0) {
                    setStoredValue('bsiPaymentAmount', String(Math.round(Number(response.amount))));
                    document.getElementById('paymentAmount').textContent = `₹${getPaymentAmount()}`;
                }
            } catch (error) {
                console.warn('Unable to load registration amount:', error.message);
            }
        }

        window.addEventListener('load', () => {
            const userName = getStoredValue('userName', 'Student');
            const userEmail = getStoredValue('userEmail', '-');
            document.getElementById('studentName').textContent = userName;
            document.getElementById('studentEmail').textContent = userEmail;
            document.getElementById('paymentAmount').textContent = `₹${getPaymentAmount()}`;
            loadRegistrationAmount();
            showPaymentReturnStatus();

            if (!getStoredValue('userRegistered', '')) {
                setStatus('Please complete registration first.');
                document.getElementById('payButton').disabled = true;
            }
        });

        async function startPayment() {
            const payButton = document.getElementById('payButton');
            payButton.disabled = true;
            payButton.textContent = 'Opening payment...';

            try {
                if (typeof Razorpay !== 'function') {
                    throw new Error('Razorpay checkout did not load. Please check your internet connection.');
                }
                if (typeof APIService === 'undefined') {
                    throw new Error('Payment API configuration did not load.');
                }
                const amount = getPaymentAmount();
                const order = await APIService.createRegistrationPaymentOrder(amount, {
                    studentName: getStoredValue('userName', ''),
                    studentEmail: getStoredValue('userEmail', ''),
                    studentPhone: getStoredValue('userPhone', getStoredValue('userMobile', '')),
                    pendingRegistrationId: getStoredValue('pendingRegistrationId', ''),
                    localOrderId: generateOrderId()
                });

                if (!order || !order.success || !order.razorpayOrderId) {
                    throw new Error(order?.message || 'Payment order could not be created.');
                }

                openRazorpay(order, payButton);
            } catch (error) {
                payButton.disabled = false;
                payButton.textContent = 'Pay Securely';
                setStatus(error.message || 'Payment could not be started.');
            }
        }

        function openRazorpay(order, payButton) {
            const amount = Number(order.amount || getPaymentAmount());
            const options = {
                key: order.razorpayKey,
                amount: amount * 100,
                currency: 'INR',
                name: 'Bihar Skill Interns',
                description: 'Registration Fee',
                order_id: order.razorpayOrderId,
                prefill: {
                    name: getStoredValue('userName', ''),
                    email: getStoredValue('userEmail', ''),
                    contact: getStoredValue('userPhone', getStoredValue('userMobile', ''))
                },
                notes: {
                    local_order_id: getStoredValue('orderId', ''),
                    student_email: getStoredValue('userEmail', '')
                },
                theme: {
                    color: '#2563eb'
                },
                handler: async function (response) {
                    await verifyPayment(response, order, payButton);
                },
                modal: {
                    ondismiss: async function () {
                        try {
                            const completed = await checkCompletedPayment(order, amount);
                            if (completed) return;
                        } catch (error) {
                            console.warn('Payment status check on close failed:', error.message);
                        }
                        payButton.disabled = false;
                        payButton.textContent = 'Pay Securely';
                    }
                }
            };

            const checkout = new Razorpay(options);
            checkout.on('payment.failed', function (response) {
                payButton.disabled = false;
                payButton.textContent = 'Pay Securely';
                setStatus(response?.error?.description || 'Payment failed. Please try again.');
            });
            checkout.open();
            payButton.textContent = 'Complete payment in popup';
            startPaymentStatusPolling(order, amount);
        }

        async function verifyPayment(response, order, payButton) {
            try {
                const verified = await APIService.verifyRegistrationPayment(
                    response.razorpay_payment_id,
                    response.razorpay_order_id,
                    response.razorpay_signature,
                    {
                        amount: order.amount || getPaymentAmount(),
                        studentEmail: getStoredValue('userEmail', ''),
                        pendingRegistrationId: getStoredValue('pendingRegistrationId', ''),
                        localOrderId: getStoredValue('orderId', '')
                    }
                );

                if (!verified || !verified.success) {
                    throw new Error(verified?.message || 'Payment verification failed.');
                }

                if (!verified.databaseUpdated) {
                    const syncedStatus = await APIService.getRegistrationPaymentStatus(
                        response.razorpay_order_id || order.razorpayOrderId,
                        {
                            studentEmail: getStoredValue('userEmail', ''),
                            amount: String(order.amount || getPaymentAmount())
                        }
                    );

                    if (!syncedStatus?.success || syncedStatus.status !== 'completed') {
                        throw new Error('Payment was received, but registration did not sync. Please try logging in after 1 minute.');
                    }
                }

                if (paymentStatusTimer) clearInterval(paymentStatusTimer);
                saveCompletedPayment({
                    amount: order.amount || getPaymentAmount(),
                    razorpayPaymentId: response.razorpay_payment_id,
                    razorpayOrderId: response.razorpay_order_id || order.razorpayOrderId,
                    razorpaySignature: response.razorpay_signature
                });
                if (verified.token) setStoredValue('authToken', verified.token);
                if (verified.student && typeof BSIAuthStorage !== 'undefined') {
                    BSIAuthStorage.saveStudent(verified.student, verified.student.passwordHash || '');
                    const savedStudentId = BSIAuthStorage.getItem('currentStudentId');
                    const savedStudent = savedStudentId ? BSIAuthStorage.getItem(savedStudentId) : null;
                    if (savedStudent) setStoredValue('student', savedStudent);
                }

                redirectToDocuments();
            } catch (error) {
                payButton.disabled = false;
                payButton.textContent = 'Pay Securely';
                setStatus(error.message || 'Payment could not be verified.');
            }
        }
    </script>
</body>
</html>
