<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bihar Skill Intern</title>
    <!-- Production metadata -->
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <meta name="description" content="Secure admin login for the Bihar Skill Intern platform.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Bihar Skill Intern">
    <meta property="og:title" content="Admin Login - Bihar Skill Intern">
    <meta property="og:description" content="Secure admin login for the Bihar Skill Intern platform.">
    <meta property="og:url" content="https://biharskillinterns.in/admin-login.html">
    <meta property="og:image" content="https://biharskillinterns.in/logo.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Admin Login - Bihar Skill Intern">
    <meta name="twitter:description" content="Secure admin login for the Bihar Skill Intern platform.">
    <meta name="twitter:image" content="https://biharskillinterns.in/logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap');

        :root {
            --admin-primary: #2563eb;
            --admin-primary-dark: #1d4ed8;
            --admin-purple: #7c3aed;
            --admin-teal: #14b8a6;
            --admin-surface: rgba(255, 255, 255, 0.82);
            --admin-surface-strong: rgba(255, 255, 255, 0.94);
            --admin-border: rgba(255, 255, 255, 0.42);
            --admin-text: #0f172a;
            --admin-muted: #64748b;
            --admin-danger: #dc2626;
            --admin-success: #047857;
            --admin-shadow: 0 30px 90px rgba(15, 23, 42, 0.28);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at 15% 15%, rgba(37, 99, 235, 0.52), transparent 28%),
                radial-gradient(circle at 85% 10%, rgba(124, 58, 237, 0.48), transparent 28%),
                linear-gradient(135deg, #0f172a 0%, #1d4ed8 48%, #7c3aed 100%);
            color: var(--admin-text);
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 28px;
            overflow-x: hidden;
            position: relative;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 340px;
            height: 340px;
            border-radius: 999px;
            filter: blur(22px);
            opacity: 0.72;
            pointer-events: none;
            z-index: 0;
            animation: floatBlob 11s ease-in-out infinite alternate;
        }

        body::before {
            left: -110px;
            bottom: 8%;
            background: rgba(20, 184, 166, 0.34);
        }

        body::after {
            right: -120px;
            top: 18%;
            background: rgba(124, 58, 237, 0.4);
            animation-delay: -4s;
        }

        .background-orb {
            position: fixed;
            inset: auto auto 16% 62%;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.18);
            filter: blur(1px);
            animation: floatOrb 9s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .auth-shell {
            width: min(100%, 450px);
            position: relative;
            z-index: 1;
            animation: pageEnter 0.7s ease both;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: var(--admin-surface);
            border: 1px solid var(--admin-border);
            border-radius: 28px;
            box-shadow: var(--admin-shadow);
            overflow: hidden;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            position: relative;
        }

        .login-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, rgba(255,255,255,0.34), rgba(255,255,255,0.08));
            pointer-events: none;
        }

        .login-header {
            color: var(--admin-text);
            padding: 38px 34px 22px;
            text-align: center;
            position: relative;
        }

        .login-header h1 {
            font-family: 'Poppins', 'Inter', sans-serif;
            font-size: 2.25rem;
            line-height: 1.08;
            margin-bottom: 8px;
            letter-spacing: 0;
        }

        .admin-login-logo {
            width: 96px;
            height: auto;
            display: block;
            margin: 0 auto 18px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(37, 99, 235, 0.14);
            border-radius: 22px;
            padding: 10px;
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.22);
        }

        .login-header p {
            font-size: 0.98rem;
            color: var(--admin-muted);
            font-weight: 600;
        }

        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 16px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--admin-primary-dark);
            border: 1px solid rgba(37, 99, 235, 0.16);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .login-body {
            padding: 22px 34px 34px;
            position: relative;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #1e293b;
            font-weight: 800;
            margin-bottom: 9px;
            font-size: 0.9rem;
        }

        .input-shell {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            display: inline-flex;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            min-height: 52px;
            padding: 14px 46px;
            border: 1px solid rgba(148, 163, 184, 0.42);
            border-radius: 16px;
            font-size: 0.98rem;
            transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
            font-family: 'Inter', Arial, sans-serif;
            background: rgba(255, 255, 255, 0.76);
            color: var(--admin-text);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(37, 99, 235, 0.84);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13), 0 12px 28px rgba(37, 99, 235, 0.1);
            background: #ffffff;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border: 0;
            border-radius: 12px;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .password-toggle:hover,
        .password-toggle:focus-visible {
            background: rgba(37, 99, 235, 0.1);
            color: var(--admin-primary);
            outline: none;
        }

        .remember-me {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 10px 0 24px;
            color: #475569;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .remember-option {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-weight: 700;
        }

        .remember-me input[type="checkbox"] {
            width: 19px;
            height: 19px;
            cursor: pointer;
            accent-color: var(--admin-primary);
        }

        .forgot-link {
            color: #94a3b8;
            font-weight: 800;
            text-decoration: none;
            cursor: not-allowed;
        }

        .login-btn {
            width: 100%;
            min-height: 54px;
            padding: 15px;
            background: linear-gradient(135deg, var(--admin-primary) 0%, var(--admin-purple) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
            margin-bottom: 18px;
            box-shadow: 0 16px 34px rgba(37, 99, 235, 0.34);
            letter-spacing: 0;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 44px rgba(37, 99, 235, 0.42);
            filter: brightness(1.04);
        }

        .login-btn:disabled {
            cursor: wait;
            opacity: 0.78;
            transform: none;
            box-shadow: 0 12px 26px rgba(37, 99, 235, 0.22);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .message {
            padding: 13px 14px;
            border-radius: 14px;
            margin-bottom: 18px;
            display: none;
            text-align: left;
            font-weight: 800;
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.13);
            color: var(--admin-success);
            border: 1px solid rgba(16, 185, 129, 0.28);
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.12);
            color: var(--admin-danger);
            border: 1px solid rgba(239, 68, 68, 0.24);
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 16px;
            color: var(--admin-muted);
            font-size: 0.93rem;
        }

        .back-link a {
            color: var(--admin-primary);
            text-decoration: none;
            font-weight: 900;
        }

        .back-link a:hover {
            color: var(--admin-purple);
        }

        .login-footer {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid rgba(148, 163, 184, 0.22);
            text-align: center;
            color: #64748b;
            font-size: 0.82rem;
            line-height: 1.6;
        }

        .login-footer strong {
            color: #1e293b;
        }

        @media (max-width: 480px) {
            body {
                padding: 18px;
                align-items: flex-start;
            }

            .auth-shell {
                margin-top: 18px;
            }

            .login-container {
                border-radius: 24px;
            }

            .login-header h1 {
                font-size: 1.8rem;
            }

            .login-header {
                padding: 30px 22px 18px;
            }

            .login-body {
                padding: 18px 22px 26px;
            }

            .remember-me {
                align-items: flex-start;
            }
        }

        @keyframes floatBlob {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(28px, -34px, 0) scale(1.08); }
        }

        @keyframes floatOrb {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-22px); }
        }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
            }
        }

        /* Course Management Styles */
        .course-management-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--admin-teal);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .course-management-btn:hover {
            background: #0d9488;
            transform: translateY(-2px);
        }

        .course-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.58);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .course-panel.show {
            display: flex;
        }

        .course-panel-content {
            background: var(--admin-surface-strong);
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 22px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .course-panel-header {
            background: linear-gradient(135deg, var(--admin-primary) 0%, var(--admin-teal) 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 22px 22px 0 0;
        }

        .course-panel-header h2 {
            font-size: 1.5em;
            margin: 0;
        }

        .close-course-panel {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }

        .course-panel-body {
            padding: 30px;
        }

        .course-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }

        .course-tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .course-tab-btn.active {
            color: #14b8a6;
            border-bottom-color: #14b8a6;
        }

        .course-tab-content {
            display: none;
        }

        .course-tab-content.active {
            display: block;
        }

        .course-item {
            background: rgba(248, 250, 252, 0.88);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 14px;
            border-left: 4px solid #14b8a6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-item-info {
            flex: 1;
        }

        .course-item-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .course-item-desc {
            font-size: 0.85em;
            color: #666;
        }

        .course-delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s;
            margin-left: 10px;
        }

        .course-delete-btn:hover {
            background: #dc2626;
        }

        .course-form {
            background: rgba(248, 250, 252, 0.88);
            padding: 20px;
            border-radius: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #14b8a6;
            box-shadow: 0 0 8px rgba(20, 184, 166, 0.2);
        }

        .form-submit-btn {
            width: 100%;
            padding: 12px;
            background: #14b8a6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-submit-btn:hover {
            background: #0d9488;
        }

        .empty-message {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .empty-message-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="background-orb" aria-hidden="true"></div>
    <main class="auth-shell" aria-label="Admin login portal">
    <div class="login-container">
        <div class="login-header">
            <img src="logo.png" alt="Bihar Skill Interns logo" class="admin-login-logo">
            <div class="secure-badge" aria-label="Secure Login">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 3l7 3v5c0 5-3.3 8.6-7 10-3.7-1.4-7-5-7-10V6l7-3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Secure Login
            </div>
            <h1>Admin Portal</h1>
            <p>Bihar Skill Intern Management System</p>
        </div>

        <div class="login-body">
            <div id="messageBox" class="message" role="status" aria-live="polite"></div>

            <form onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label for="adminId">Admin Email</label>
                    <div class="input-shell">
                        <span class="input-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <input
                            type="email"
                            id="adminId"
                            placeholder="Enter admin email"
                            required
                            autocomplete="off"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="input-shell">
                        <span class="input-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
                                <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <input
                            type="password"
                            id="adminPassword"
                            placeholder="Enter password"
                            required
                            autocomplete="off"
                        >
                        <button type="button" class="password-toggle" onclick="toggleAdminPassword()" aria-label="Show password" aria-pressed="false">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="remember-me">
                    <label class="remember-option" for="rememberMe">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <span class="forgot-link" aria-disabled="true" title="Use admin recovery process if needed">Forgot Password</span>
                </div>

                <button type="submit" class="login-btn">Login as Admin</button>
            </form>

            <div class="back-link">
                <a href="index.html">Back to Home</a>
            </div>

            <div class="login-footer">
                <strong>Protected by Bihar Skill Intern</strong><br>
                Version 2.0 | Copyright &copy; Bihar Skill Intern
            </div>
        </div>
    </div>
    </main>

    <!-- Course Management Panel -->
    <div id="coursePanel" class="course-panel">
        <div class="course-panel-content">
            <div class="course-panel-header">
                <h2>📚 Course Management</h2>
                <button class="close-course-panel" onclick="closeCoursePanel()">&times;</button>
            </div>
            <div class="course-panel-body">
                <div class="course-tabs">
                    <button class="course-tab-btn active" onclick="switchCourseTab('view')">View Courses</button>
                    <button class="course-tab-btn" onclick="switchCourseTab('add')">Add New Course</button>
                </div>

                <!-- View Courses Tab -->
                <div id="viewTab" class="course-tab-content active">
                    <div id="coursesList"></div>
                </div>

                <!-- Add Course Tab -->
                <div id="addTab" class="course-tab-content">
                    <div class="course-form">
                        <label>Course Name: <span style="color: #ef4444;">*</span></label>
                        <input type="text" id="newCourseName" class="form-input" placeholder="e.g., Data Science, Python Programming">

                        <label>Description: <span style="color: #ef4444;">*</span></label>
                        <input type="text" id="newCourseDesc" class="form-input" placeholder="Brief description">

                        <label>Duration (days): <span style="color: #ef4444;">*</span></label>
                        <input type="number" id="newCourseDuration" class="form-input" placeholder="e.g., 30">

                        <button class="form-submit-btn" onclick="addNewCourse()">✅ Add Course</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script>
        const STATIC_ADMIN_EMAIL = 'admin@bihar.com';
        const STATIC_ADMIN_PASSWORD = 'Admin@123';

        function completeAdminLogin(adminId, rememberMe, messageBox) {
            localStorage.setItem('isAdminLoggedIn', 'true');
            localStorage.setItem('adminEmail', adminId);
            localStorage.setItem('adminName', 'Admin');
            localStorage.setItem('adminRemember', rememberMe ? 'true' : 'false');
            messageBox.textContent = 'Admin login successful! Redirecting...';
            messageBox.className = 'message success';
            setTimeout(() => {
                window.location.href = 'admin-dashboard.html';
            }, 900);
        }

        function isLocalDemoMode() {
            const isLocalHost = window.location.protocol === 'file:' || ['localhost', '127.0.0.1', ''].includes(window.location.hostname);
            return isLocalHost && localStorage.getItem('bsiEnableAdminDemo') === 'true';
        }

        function isLocalHost() {
            return window.location.protocol === 'file:' || ['localhost', '127.0.0.1', ''].includes(window.location.hostname);
        }

        function getDemoAdminCredentials() {
            return {
                email: localStorage.getItem('bsiDemoAdminEmail') || STATIC_ADMIN_EMAIL,
                password: localStorage.getItem('bsiDemoAdminPassword') || STATIC_ADMIN_PASSWORD
            };
        }

        function getApiBaseUrlForDisplay() {
            try {
                if (typeof API_BASE_URL !== 'undefined') return API_BASE_URL;
            } catch (error) {
                return 'API config unavailable';
            }
            return 'API config unavailable';
        }

        function getAdminLoginErrorMessage(error) {
            const apiBase = getApiBaseUrlForDisplay();
            const status = error && error.status;
            const rawMessage = String((error && error.message) || '').trim();

            if (status === 401) {
                return 'Invalid admin email or password. Create this admin on the live server, or reset the live admin password.';
            }

            if (status === 403) {
                return 'Admin access is blocked by server settings. Check ADMIN_REGISTRATION_KEY and admin role setup.';
            }

            if (status === 422 || status === 400) {
                return rawMessage || 'Please enter a valid admin email and password.';
            }

            if (status === 503) {
                return rawMessage || 'Backend database is starting. Wait a minute and try again.';
            }

            if (rawMessage === 'API request timed out') {
                return `Backend took too long to respond. API: ${apiBase}`;
            }

            if (typeof APIService !== 'undefined' && APIService.isNetworkError && APIService.isNetworkError(error)) {
                return `Cannot reach backend from this domain. Check deployed api-config.js and Render CORS FRONTEND_URLS. API: ${apiBase}`;
            }

            return `${rawMessage || 'Backend admin login failed.'} API: ${apiBase}`;
        }

        function toggleAdminPassword() {
            const passwordInput = document.getElementById('adminPassword');
            const toggleButton = document.querySelector('.password-toggle');
            if (!passwordInput || !toggleButton) return;

            const showPassword = passwordInput.type === 'password';
            passwordInput.type = showPassword ? 'text' : 'password';
            toggleButton.setAttribute('aria-label', showPassword ? 'Hide password' : 'Show password');
            toggleButton.setAttribute('aria-pressed', String(showPassword));
        }

        window.addEventListener('load', () => {
            if (localStorage.getItem('adminRemember') === 'true') {
                document.getElementById('adminId').value = localStorage.getItem('adminEmail') || '';
                document.getElementById('rememberMe').checked = true;
            }

            const loginButton = document.querySelector('.login-btn');
            if (loginButton) {
                loginButton.textContent = 'Login as Admin';
            }

            const backLink = document.querySelector('.back-link a');
            if (backLink) {
                backLink.textContent = 'Back to Home';
            }

            const panelTitle = document.querySelector('.course-panel-header h2');
            if (panelTitle) {
                panelTitle.textContent = 'Course Management';
            }

            const addCourseButton = document.querySelector('.form-submit-btn');
            if (addCourseButton) {
                addCourseButton.textContent = 'Add Course';
            }
        });

        async function handleLegacyAdminLogin(event) {
            event.preventDefault();

            const adminId = document.getElementById('adminId').value.trim();
            const adminPassword = document.getElementById('adminPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const messageBox = document.getElementById('messageBox');
            const submitButton = event.target.querySelector('button[type="submit"]');

            messageBox.className = 'message';
            submitButton.disabled = true;
            submitButton.textContent = 'Signing in...';

            const demoCredentials = getDemoAdminCredentials();
            if (adminId === demoCredentials.email && adminPassword === demoCredentials.password) {
                completeAdminLogin(adminId, rememberMe, messageBox);
            } else {
                messageBox.textContent = '✗ Invalid admin ID or password!';
                messageBox.className = 'message error';
            }
        }

        async function handleAdminLogin(event) {
            event.preventDefault();

            const adminId = document.getElementById('adminId').value.trim();
            const adminPassword = document.getElementById('adminPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const messageBox = document.getElementById('messageBox');
            const submitButton = event.target.querySelector('button[type="submit"]');

            messageBox.className = 'message';
            submitButton.disabled = true;
            submitButton.textContent = 'Signing in...';

            try {
                if (typeof APIService !== 'undefined') {
                    const response = await APIService.loginAdmin(adminId, adminPassword);
                    if (response && response.success) {
                        localStorage.setItem('isAdminLoggedIn', 'true');
                        localStorage.setItem('adminEmail', response.admin.email);
                        localStorage.setItem('adminName', response.admin.fullName || 'Admin');
                        localStorage.setItem('adminRemember', rememberMe ? 'true' : 'false');

                        messageBox.textContent = 'Admin login successful! Redirecting...';
                        messageBox.className = 'message success';

                        setTimeout(() => {
                            window.location.href = 'admin-dashboard.html';
                        }, 1200);
                        return;
                    }
                }
            } catch (apiError) {
                console.warn('Backend admin login failed:', apiError.message);
                if (!isLocalDemoMode()) {
                    messageBox.textContent = getAdminLoginErrorMessage(apiError);
                    messageBox.className = 'message error';
                    submitButton.disabled = false;
                    submitButton.textContent = 'Login as Admin';
                    return;
                }
            }

            if (!isLocalDemoMode()) {
                messageBox.textContent = 'Backend admin login failed. Please use the admin account created on the live server.';
                messageBox.className = 'message error';
                submitButton.disabled = false;
                submitButton.textContent = 'Login as Admin';
                return;
            }

            const demoCredentials = getDemoAdminCredentials();
            if (adminId === demoCredentials.email && adminPassword === demoCredentials.password) {
                completeAdminLogin(adminId, rememberMe, messageBox);
            } else {
                messageBox.textContent = 'Invalid admin ID or password!';
                messageBox.className = 'message error';
            }

            submitButton.disabled = false;
            submitButton.textContent = 'Login as Admin';
        }

        // ========== COURSE MANAGEMENT FUNCTIONS ==========
        function openCoursePanel() {
            document.getElementById('coursePanel').classList.add('show');
            loadCourses();
        }

        function closeCoursePanel() {
            document.getElementById('coursePanel').classList.remove('show');
        }

        function switchCourseTab(tab) {
            // Hide all tabs
            document.getElementById('viewTab').classList.remove('active');
            document.getElementById('addTab').classList.remove('active');
            
            // Remove active from all buttons
            document.querySelectorAll('.course-tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Show selected tab
            if (tab === 'view') {
                document.getElementById('viewTab').classList.add('active');
                document.querySelectorAll('.course-tab-btn')[0].classList.add('active');
                loadCourses();
            } else if (tab === 'add') {
                document.getElementById('addTab').classList.add('active');
                document.querySelectorAll('.course-tab-btn')[1].classList.add('active');
            }
        }

        function getCourses() {
            const coursesStr = localStorage.getItem('adminCourses');
            const defaultCourses = [
                { id: 1, name: 'Skill Development', description: 'Learn professional skills', duration: 30 },
                { id: 2, name: 'Social Work', description: 'Community service training', duration: 30 },
                { id: 3, name: 'Population Study', description: 'Demographic research', duration: 30 },
                { id: 4, name: 'Disaster Management', description: 'Emergency response training', duration: 30 },
                { id: 5, name: 'Digital Literacy', description: 'Complete guide to digital skills', duration: 50 }
            ];

            if (!coursesStr) {
                localStorage.setItem('adminCourses', JSON.stringify(defaultCourses));
                return defaultCourses;
            }

            try {
                const parsedCourses = JSON.parse(coursesStr);
                if (!Array.isArray(parsedCourses) || parsedCourses.length === 0) {
                    localStorage.setItem('adminCourses', JSON.stringify(defaultCourses));
                    return defaultCourses;
                }
                return parsedCourses;
            } catch (e) {
                localStorage.setItem('adminCourses', JSON.stringify(defaultCourses));
                return defaultCourses;
            }
        }

        function loadCourses() {
            const courses = getCourses();
            const coursesList = document.getElementById('coursesList');
            
            if (courses.length === 0) {
                coursesList.innerHTML = `
                    <div class="empty-message">
                        <div class="empty-message-icon">📚</div>
                        <p>No courses available</p>
                    </div>
                `;
                return;
            }

            coursesList.innerHTML = courses.map(course => `
                <div class="course-item">
                    <div class="course-item-info">
                        <div class="course-item-name">${course.name}</div>
                        <div class="course-item-desc">${course.description} • ${course.duration} days</div>
                    </div>
                    <button class="course-delete-btn" onclick="deleteCourseItem(${course.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }

        function deleteCourseItem(courseId) {
            if (confirm('Are you sure you want to delete this course?')) {
                let courses = getCourses();
                courses = courses.filter(c => c.id !== courseId);
                localStorage.setItem('adminCourses', JSON.stringify(courses));
                alert('✓ Course deleted successfully!');
                loadCourses();
            }
        }

        function addNewCourse() {
            const name = document.getElementById('newCourseName').value.trim();
            const description = document.getElementById('newCourseDesc').value.trim();
            const duration = parseInt(document.getElementById('newCourseDuration').value);

            if (!name) {
                alert('Please enter course name!');
                return;
            }

            if (!description) {
                alert('Please enter course description!');
                return;
            }

            if (!duration || duration < 1) {
                alert('Please enter a valid duration!');
                return;
            }

            const courses = getCourses();
            const newId = Math.max(...courses.map(c => c.id), 0) + 1;

            const newCourse = {
                id: newId,
                name: name,
                description: description,
                duration: duration
            };

            courses.push(newCourse);
            localStorage.setItem('adminCourses', JSON.stringify(courses));

            // Clear form
            document.getElementById('newCourseName').value = '';
            document.getElementById('newCourseDesc').value = '';
            document.getElementById('newCourseDuration').value = '';

            alert('✓ Course added successfully!');
            switchCourseTab('view');
        }

        // Close panel on outside click
        document.addEventListener('click', (event) => {
            const panel = document.getElementById('coursePanel');
            const panelContent = document.querySelector('.course-panel-content');
            if (panel && event.target === panel) {
                closeCoursePanel();
            }
        });
    </script>
