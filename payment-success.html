<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Bihar Skill Interns</title>
</head>
<body>
    <script>
        localStorage.setItem('paymentStatus', 'completed');
        localStorage.setItem('paymentVerified', 'true');
        localStorage.setItem('isRegistrationComplete', 'true');
        localStorage.setItem('isLoggedIn', 'false');
        localStorage.setItem('paymentCompletedAt', new Date().toISOString());
        const params = new URLSearchParams(window.location.search);
        if (params.get('razorpay_payment_id')) {
            localStorage.setItem('razorpayPaymentId', params.get('razorpay_payment_id'));
        }
        if (params.get('razorpay_order_id')) {
            localStorage.setItem('razorpayOrderId', params.get('razorpay_order_id'));
        }
        window.location.replace('registration-documents.html');
    </script>
</body>
</html>
